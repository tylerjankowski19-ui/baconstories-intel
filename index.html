<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scripting — BaconStories</title>
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scripting">
<meta name="theme-color" content="#0a0a0a">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
:root {
  --bg:#0a0a0a; --surface:#141414; --surface2:#1c1c1c; --surface3:#242424;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#fff; --muted:#686868; --muted2:#a0a0a0;
  --accent:#ff0000; --accent-dim:rgba(255,0,0,0.10);
  --green:#22c55e; --green-bg:rgba(34,197,94,0.1);
  --orange:#f97316; --orange-bg:rgba(249,115,22,0.1);
  --red:#ff0000; --red-bg:rgba(255,0,0,0.1);
  --gold:#ffd700; --nav-h:72px; --header-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:var(--nav-h);-webkit-font-smoothing:antialiased;overscroll-behavior:none;}

/* HEADER */
.app-header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:var(--header-h);display:flex;align-items:center;padding:0 20px;}
.app-logo{display:flex;align-items:center;gap:10px;}
.logo-play{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:900;padding-left:2px;flex-shrink:0;}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-0.5px;}

/* VIEWS */
.view{display:none;padding:20px 16px 28px;animation:fadeIn 0.2s ease;}
.view.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(10,10,10,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity 0.15s;padding:8px 0;}
.nav-item:active{opacity:0.6;}
.nav-icon{width:22px;height:22px;color:var(--muted);transition:color 0.2s,transform 0.2s;stroke:currentColor;}
.nav-label{font-size:10px;font-weight:600;color:var(--muted);transition:color 0.2s;letter-spacing:0.3px;}
.nav-item.active .nav-icon{color:var(--accent);transform:scale(1.1);}
.nav-item.active .nav-label{color:var(--accent);}

/* CHANNEL CARD */
.channel-card{background:linear-gradient(135deg,#1a0000 0%,#141414 100%);border:1px solid var(--border2);border-radius:24px;padding:28px 24px;margin-bottom:20px;position:relative;overflow:hidden;}
.channel-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(255,0,0,0.18) 0%,transparent 70%);pointer-events:none;}
.channel-name{font-size:12px;font-weight:700;color:var(--muted2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.sub-count{font-size:54px;font-weight:900;letter-spacing:-3px;line-height:1;color:var(--text);margin-bottom:6px;transition:opacity 0.3s;}
.sub-count.loading{opacity:0.25;}
.sub-unit{font-size:18px;font-weight:400;color:var(--muted2);margin-left:2px;letter-spacing:0;}
.daily-gain{display:inline-flex;align-items:center;gap:6px;background:var(--green-bg);border:1px solid rgba(34,197,94,0.25);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--green);}
.daily-gain.neg{background:var(--red-bg);border-color:rgba(255,0,0,0.25);color:var(--accent);}
.daily-gain.neutral{background:var(--surface2);border-color:var(--border2);color:var(--muted2);}
.channel-handle{font-size:12px;color:var(--muted);margin-top:14px;}

/* VIDEO PERF CARDS */
.recent-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.video-perf-card{background:var(--surface);border-radius:18px;border:2px solid var(--border);margin-bottom:12px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.15s,border-color 0.2s;text-decoration:none;display:block;}
.video-perf-card:active{transform:scale(0.97);}
.video-perf-card.perf-green{border-color:var(--green);}
.video-perf-card.perf-orange{border-color:var(--orange);}
.video-perf-card.perf-red{border-color:var(--accent);}
.vthumb{width:100%;height:180px;background:linear-gradient(135deg,#1a0000,#1c1c1c);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.vthumb img{width:100%;height:100%;object-fit:cover;}
.vthumb-fallback{font-size:40px;opacity:0.2;}
.views-pill{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;color:#fff;}
.perf-badge{position:absolute;top:10px;left:10px;border-radius:20px;padding:4px 10px;font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;}
.perf-badge.green{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.perf-badge.orange{background:var(--orange-bg);color:var(--orange);border:1px solid rgba(249,115,22,0.3);}
.perf-badge.red{background:var(--red-bg);color:var(--accent);border:1px solid rgba(255,0,0,0.3);}
.vcardBody{padding:14px 16px;}
.vcardTitle{font-size:15px;font-weight:700;line-height:1.35;letter-spacing:-0.2px;margin-bottom:6px;}
.vcardMeta{font-size:12px;color:var(--muted2);display:flex;gap:12px;}
.api-note{background:var(--surface2);border:1px dashed var(--border2);border-radius:16px;padding:20px;text-align:center;margin-bottom:16px;}
.api-note p{font-size:13px;color:var(--muted2);line-height:1.7;}
.api-note code{font-size:11px;background:var(--surface3);padding:2px 6px;border-radius:4px;color:var(--accent);}

/* SCRIPTS */
.scripts-meta{font-size:12px;color:var(--muted);margin-bottom:20px;}
.script-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;margin-bottom:20px;overflow:hidden;}
.script-header{padding:20px;background:linear-gradient(135deg,#1a0000 0%,#0d0d0d 100%);border-bottom:1px solid var(--border);}
.script-num{font-size:10px;color:var(--green);font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.script-title{font-size:18px;font-weight:800;margin-bottom:10px;line-height:1.25;letter-spacing:-0.5px;}
.script-meta{display:flex;gap:6px;flex-wrap:wrap;}
.script-tag{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;border:1px solid var(--border2);color:var(--muted2);background:var(--surface3);}
.script-body{padding:0;}
.script-block{border-bottom:1px solid var(--border);}
.script-block-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 11px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.script-block-left{display:flex;align-items:center;gap:8px;}
.script-block-right{display:flex;align-items:center;gap:8px;}
.script-block-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;}
.script-block-time{font-size:10px;color:var(--muted);font-weight:600;}
.script-block-copy{font-size:11px;padding:5px 12px;border-radius:20px;background:var(--surface3);border:1px solid var(--border2);color:var(--muted2);cursor:pointer;font-weight:600;-webkit-tap-highlight-color:transparent;transition:all 0.15s;white-space:nowrap;font-family:inherit;}
.script-block-copy:active,.script-block-copy.copied{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.chevron{font-size:13px;color:var(--muted);transition:transform 0.2s;display:inline-block;flex-shrink:0;}
.script-block.collapsed .chevron{transform:rotate(-90deg);}
.script-block.collapsed .script-text,.script-block.collapsed .script-block-copy,.script-block.collapsed .img-prompt-row{display:none;}
.script-text{font-size:15px;line-height:1.8;color:var(--text);padding:2px 16px 16px;white-space:pre-wrap;}
.script-note{font-size:12px;color:var(--muted);font-style:italic;background:var(--surface2);border-radius:10px;padding:10px 14px;margin:0 16px 16px;line-height:1.6;}
.thumb-section{padding:16px;border-top:1px solid var(--border);background:var(--surface2);}
.thumb-section-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
.thumb-layer{font-size:13px;color:var(--muted2);margin-bottom:8px;line-height:1.6;}
.img-prompt-row{display:flex;align-items:flex-start;gap:10px;padding:8px 16px 14px;background:rgba(255,0,0,0.05);border-top:1px dashed rgba(255,0,0,0.2);}
.img-prompt-text{font-size:12px;color:var(--muted);line-height:1.5;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.img-prompt-copy{font-size:11px;padding:5px 12px;border-radius:20px;background:rgba(255,0,0,0.10);border:1px solid rgba(255,0,0,0.3);color:var(--accent);cursor:pointer;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all 0.15s;-webkit-tap-highlight-color:transparent;font-family:inherit;}
.img-prompt-copy.copied{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.copy-all-btn{width:calc(100% - 32px);margin:16px;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;font-family:inherit;}
.copy-all-btn:active{opacity:0.8;}
.copy-all-btn.copied{background:var(--green);}

/* BUILDER */
.builder-form{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:14px;}
.builder-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block;}
.builder-input,.builder-select{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:14px;padding:12px 14px;border-radius:12px;margin-bottom:14px;-webkit-appearance:none;appearance:none;font-family:inherit;}
.builder-input:focus,.builder-select:focus{outline:none;border-color:var(--accent);}
.builder-select option{background:#1c1c1c;}
.builder-generate-btn{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.15s;-webkit-tap-highlight-color:transparent;font-family:inherit;}
.builder-generate-btn:active{opacity:0.8;}
.builder-result{display:none;}
.builder-result.visible{display:block;}
.builder-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;}
.builder-block-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);padding:12px 16px 4px;}
.builder-block-time{font-size:11px;color:var(--muted);padding:0 16px 8px;}
.builder-tip{font-size:12px;color:var(--muted2);background:rgba(255,0,0,0.06);border-left:3px solid var(--accent);padding:8px 12px;border-radius:0 8px 8px 0;margin:0 16px 8px;line-height:1.6;}
.builder-textarea{width:100%;background:var(--surface2);border:none;border-top:1px solid var(--border);color:var(--text);font-size:14px;line-height:1.75;padding:12px 16px;resize:vertical;min-height:90px;font-family:inherit;}
.builder-textarea:focus{outline:none;background:#1a0000;}
.builder-title-wrap{margin-bottom:12px;}
.builder-title-input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:15px;font-weight:700;padding:12px 16px;border-radius:12px;font-family:inherit;}
.builder-title-input:focus{outline:none;border-color:var(--accent);}
.builder-copy-btn{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.15s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;font-family:inherit;}
.builder-copy-btn:active{opacity:0.8;}
.builder-copy-btn.copied{background:var(--green);}

/* DEBRIEF */
.debrief-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:14px;}
.debrief-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.debrief-label.g{color:var(--green);}
.debrief-label.r{color:var(--accent);}
.debrief-label.gold{color:var(--gold);}
.debrief-item{display:flex;gap:12px;margin-bottom:14px;}
.debrief-item:last-child{margin-bottom:0;}
.debrief-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:8px;}
.debrief-dot.g{background:var(--green);}
.debrief-dot.r{background:var(--accent);}
.debrief-dot.gold{background:var(--gold);}
.debrief-text{font-size:14px;line-height:1.7;color:var(--muted2);}
.debrief-text strong{color:var(--text);font-weight:700;}
.debrief-footer{font-size:11px;color:var(--muted);text-align:center;margin-top:16px;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + 16px);left:50%;transform:translateX(-50%) translateY(60px);background:var(--green);color:#fff;padding:10px 24px;border-radius:30px;font-size:13px;font-weight:700;transition:transform 0.3s ease;z-index:999;white-space:nowrap;box-shadow:0 4px 24px rgba(34,197,94,0.35);font-family:inherit;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

<div class="bottom-nav">

</div>

<script>
// ── CONFIG ──────────────────────────────────────
const YT_API_KEY = ''; // paste your YouTube Data API v3 key here

// ── DATE ─────────────────────────────────────────

function chunkText(text, maxChars) {
  maxChars = maxChars || 480;
  if (text.length <= maxChars) return [text];
  var chunks = [];
  var remaining = text;
  while (remaining.length > maxChars) {
    var cut = -1;
    var candidates = [
      remaining.lastIndexOf('. ', maxChars),
      remaining.lastIndexOf('! ', maxChars),
      remaining.lastIndexOf('? ', maxChars),
      remaining.lastIndexOf('\n\n', maxChars),
      remaining.lastIndexOf('\n', maxChars),
    ];
    for (var i = 0; i < candidates.length; i++) {
      if (candidates[i] > cut) cut = candidates[i];
    }
    if (cut <= 0) cut = remaining.lastIndexOf(' ', maxChars);
    if (cut <= 0) cut = maxChars;
    else cut += 1;
    chunks.push(remaining.slice(0, cut).trim());
function toggleBlock(block) {
  block.classList.toggle('collapsed');

function copyBlock(btn, id) {
  const el = document.getElementById(id);
  if (!el) return;
  doCopy(el.innerText, () => {
    const orig = btn.textContent;
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function doCopy(text, cb) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => { showToast(); if (cb) cb(); }).catch(() => fallbackCopy(text, cb));
  } else { fallbackCopy(text, cb); }
}

function fallbackCopy(text, cb) {

  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); showToast(); if (cb) cb(); } catch(e) {}
  document.body.removeChild(ta);
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── SWITCH VIEW ──────────────────────────────────
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if (name === 'builder') renderBuilder();
  if (name === 'debrief') renderDebrief();
}

// ── YOUTUBE API ───────────────────────────────────
function fmtN(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

async function fetchChannelData() {
  if (!YT_API_KEY) {
    document.getElementById('api-note').style.display = 'block';
    document.getElementById('ch-subs').innerHTML = '—<span class="sub-unit"> subs</span>';
    document.getElementById('ch-subs').classList.remove('loading');
    showPlaceholderVideos();
    return;
  }
  try {
    const r = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${CHANNEL_ID}&key=${YT_API_KEY}`);
    const d = await r.json();
    const ch = d.items[0];
    const subs = parseInt(ch.statistics.subscriberCount);
    document.getElementById('ch-name').textContent = ch.snippet.title;
    document.getElementById('ch-subs').innerHTML = `${fmtN(subs)}<span class="sub-unit"> subscribers</span>`;
    document.getElementById('ch-subs').classList.remove('loading');

    const todayKey = 'subs_' + new Date().toDateString();
    const yKey = 'subs_' + new Date(Date.now()-86400000).toDateString();
    localStorage.setItem(todayKey, subs);
    const ySubs = parseInt(localStorage.getItem(yKey));
    if (!isNaN(ySubs)) {
      const gain = subs - ySubs;
      const el = document.getElementById('ch-gain');
      document.getElementById('gain-wrap').style.display = 'block';
      el.textContent = (gain >= 0 ? '+' : '') + gain + ' today';
      el.className = 'daily-gain' + (gain < 0 ? ' neg' : gain === 0 ? ' neutral' : '');
    }
    loadVideos();
  } catch(e) {
    document.getElementById('ch-subs').innerHTML = '—<span class="sub-unit"> subs</span>';
    document.getElementById('ch-subs').classList.remove('loading');
    showPlaceholderVideos();
  }
}

async function loadVideos() {
  const c = document.getElementById('recent-videos');
  try {
    const sr = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&order=date&maxResults=5&type=video&key=${YT_API_KEY}`);
    const sd = await sr.json();
    const ids = sd.items.map(i=>i.id.videoId).join(',');
    const vr = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet&id=${ids}&key=${YT_API_KEY}`);
    const vd = await vr.json();
    const videos = vd.items.slice(0,2);
    const avg = videos.reduce((s,v)=>s+parseInt(v.statistics.viewCount||0),0)/videos.length;
    c.innerHTML = videos.map(v => {
      const views = parseInt(v.statistics.viewCount||0);
      const ratio = avg > 0 ? views/avg : 0.5;
      const perf = ratio>=1.2?'green':ratio>=0.6?'orange':'red';
      const badge = perf==='green'?'✦ Strong':perf==='orange'?'◆ Average':'▾ Needs Work';
      const thumb = v.snippet.thumbnails?.maxres?.url || v.snippet.thumbnails?.high?.url || '';
      const pub = new Date(v.snippet.publishedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      const url = `https://www.youtube.com/watch?v=${v.id}`;
      return `<a class="video-perf-card perf-${perf}" href="${url}" target="_blank" rel="noopener">
        <div class="vthumb">${thumb?`<img src="${thumb}" loading="lazy">`:`<div class="vthumb-fallback">▶</div>`}
          <div class="perf-badge ${perf}">${badge}</div>
          <div class="views-pill">${fmtN(views)} views</div>
        </div>
        <div class="vcardBody">
          <div class="vcardTitle">${v.snippet.title}</div>
          <div class="vcardMeta"><span>${fmtN(views)} views</span><span style="color:var(--muted)">${pub}</span></div>
        </div>
      </a>`;
    }).join('');
  } catch(e) {
    c.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;">Could not load videos.</div>';
  }
}

function showPlaceholderVideos() {
  document.getElementById('recent-videos').innerHTML = `
  <div class="api-note"><p>Connect your YouTube API key to see live video performance with green / orange / red performance ratings.</p></div>`;
}

// ── RENDER SCRIPTS ────────────────────────────────
function renderScripts() {
  const si = D % 5;
  const todayScripts = [SCRIPTS[si], SCRIPTS[si+5], SCRIPTS[si+10]];
  document.getElementById('scripts-meta').textContent = `${DATE_STR} · Scenario Choice · 480-char TTS`;

  function sectionColor(l) {
    if(l.includes('VIP')) return '#ffd700';
    if(l==='CTA') return '#ff0000';
    if(l==='HOOK'||l==='SETUP') return '#22c55e';
    return '#a0a0c0';
  }
  const IMG_LABELS = {'HOOK':'hook','OPTION A':'optionA','OPTION B':'optionB','OPTION C':'optionC','VIP OPTION \u{1F451}':'vip'};

  let html='';
  todayScripts.forEach((s,idx) => {
    const n=idx+1; let chunksHtml=''; let ci=0;
    s.sections.forEach(sec => {
      const chunks=chunkText(sec.text,480);
      const color=sectionColor(sec.label);
      const pk=IMG_LABELS[sec.label];
      const pt=pk&&s.imagePrompts?s.imagePrompts[pk]:null;
      chunks.forEach((chunk,pi) => {
        const cId=`s${n}_c${ci}`;
        const lbl=chunks.length>1?`${sec.label} ${pi+1}/${chunks.length}`:sec.label;
        const isLast=pi===chunks.length-1;
        const ep=pt?escapeAttr(pt):'';
        const imgRow=(pt&&isLast)?`<div class="img-prompt-row"><div class="img-prompt-text">\u{1F3A8} ${ep}</div><button class="img-prompt-copy" onclick="event.stopPropagation();copyImgPrompt(this)" data-prompt="${ep}">Copy Prompt</button></div>`:'';
        chunksHtml+=`<div class="script-block"><div class="script-block-header" onclick="toggleBlock(this.closest('.script-block'))"><div class="script-block-left"><span class="chevron">\u25BE</span><span class="script-block-label" style="color:${color}">${lbl}</span><span class="script-block-time">${chunk.length} chars</span></div><div class="script-block-right"><button class="script-block-copy" onclick="event.stopPropagation();copyBlock(this,'${cId}')">Copy</button></div></div><div class="script-text" id="${cId}">${chunk}</div>${imgRow}</div>`;
        ci++;
      });
    });
    html+=`<div class="script-card"><div class="script-header"><div class="script-num">Script 0${n} \u00B7 Scenario Choice</div><div class="script-title">${s.title}</div><div class="script-meta">${s.tags.map(t=>`<span class="script-tag">${t}</span>`).join('')}</div></div><div class="script-body">${chunksHtml}</div><div class="script-note">${s.footage}</div><div class="thumb-section"><div class="thumb-section-label">\u{1F5BC}\uFE0F Thumbnail Concept</div><div class="thumb-layer">${s.thumb.bg}</div><div class="thumb-layer">${s.thumb.text}</div><div class="thumb-layer">${s.thumb.reaction}</div></div><button class="copy-all-btn" id="copyBtn${n}" onclick="copyFullScript(${n})">\u{1F4CB} Copy Full Script</button></div>`;
  });
  document.getElementById('scripts-container').innerHTML=html;
  window._todayScripts=todayScripts;
}

    payloadTip: '5–6 facts. Each one: state it sharply, then add the context that makes it even wilder. "That\'s not a typo." format works.',
    payloadText: "Fact one — [SHOCKING STATEMENT]. [Context that makes it even more wild — 2 sentences.]\n\nFact two — [SHOCKING STATEMENT]. [Context — 2 sentences.]\n\nFact three — [SHOCKING STATEMENT]. [Context — 2 sentences.]\n\nFact four — [SHOCKING STATEMENT]. [Context — 2 sentences.]\n\nFact five — [SHOCKING STATEMENT THAT DELIVERS THE FINAL GUT PUNCH]. [Context.]",
    ctaTip: 'Numbered CTA drives huge engagement — forces a specific answer, easy to respond.',
    ctaText: 'Drop the number of the one that got you worst in the comments. I need to see if everyone cracks on the same one.',
    titleHint: 'Facts About [TOPIC] That Sound Completely Made Up 💀😳',
  },
};

// ── RENDER DEBRIEF ────────────────────────────────
async function renderDebrief() {
  const c = document.getElementById('debrief-container');
  if (!YT_API_KEY) { staticDebrief(c); return; }
  c.innerHTML='<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:14px;">Analyzing…</div>';
  try {
    const sr=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&order=date&maxResults=10&type=video&key=${YT_API_KEY}`);
    const sd=await sr.json();
    const ids=sd.items.map(i=>i.id.videoId).join(',');
    const vr=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet&id=${ids}&key=${YT_API_KEY}`);
    const vd=await vr.json();
    const vids=vd.items;
    const avg=vids.reduce((s,v)=>s+parseInt(v.statistics.viewCount||0),0)/vids.length;
    const top=vids.reduce((a,b)=>parseInt(a.statistics.viewCount||0)>parseInt(b.statistics.viewCount||0)?a:b);
    const bot=vids.reduce((a,b)=>parseInt(a.statistics.viewCount||0)<parseInt(b.statistics.viewCount||0)?a:b);
    buildDebrief(c,[
      `<strong>${top.snippet.title}</strong> is your top performer — study its title structure and replicate it.`,
      `Your average of <strong>${fmtN(Math.round(avg))} views</strong> per video shows a consistent baseline audience.`,
      `Staying in the Scenario Choice format is working — it generates the highest comment engagement in this niche.`,
    ],[
      `<strong>${bot.snippet.title}</strong> underperformed — the hook or thumbnail likely did not stop the scroll.`,
      `The gap between your best and worst performers signals inconsistent title specificity.`,
      `Generic CTAs cost you comments — always ask a direct scenario question tied to the video content.`,
    ],[
      `Study your top video title and use the exact same formula for your next 3 uploads.`,
      `Every title needs a specific noun — "You Got In Trouble" loses to "Your Teacher Called Your Parents During Class."`,
      `Batch record 3 Shorts and post every 2 days — consistent cadence beats burst posting for Shorts growth.`,
    ]);
  } catch(e) { staticDebrief(c); }
}

function staticDebrief(c) {
  buildDebrief(c,[
    `<strong>Scenario Choice format</strong> drives the highest comment engagement in your niche — viewers always comment their choice.`,
    `<strong>Family and school drama</strong> consistently outperform abstract topics — you are in the right lane.`,
    `<strong>The VIP unlock mechanic</strong> converts passive viewers into subscribers every time it's used correctly.`,
  ],[
    `<strong>Title specificity</strong> is your biggest lever — vague titles lose the scroll, specific ones stop it.`,
    `<strong>Irregular posting</strong> reduces algorithm distribution — aim for every 2 days minimum.`,
    `<strong>Hook energy</strong> — starting with a situation instead of an action word (WAIT / GUYS) loses viewers in the first 2 seconds.`,
  ],[
    `Add one specific noun to every title before posting. "You Got Caught" \u2192 "Your Dad Found Everything On Your Phone 💀"`,
    `Film 3 Shorts in one session and schedule them 2 days apart for consistent cadence.`,
    `Use the 5-day script rotation in this app — every script is built for maximum engagement.`,
  ]);
}

function buildDebrief(c, working, notWorking, tips) {
  c.innerHTML=`
  <div class="debrief-card">
    <div class="debrief-label g">\u2726 What's Working</div>
    ${working.map(t=>`<div class="debrief-item"><div class="debrief-dot g"></div><div class="debrief-text">${t}</div></div>`).join('')}
  </div>
  <div class="debrief-card">
    <div class="debrief-label r">\u25BE What Isn't Working</div>
    ${notWorking.map(t=>`<div class="debrief-item"><div class="debrief-dot r"></div><div class="debrief-text">${t}</div></div>`).join('')}
  </div>
  <div class="debrief-card">
    <div class="debrief-label gold">\u25C6 Tips To Improve</div>
    ${tips.map(t=>`<div class="debrief-item"><div class="debrief-dot gold"></div><div class="debrief-text">${t}</div></div>`).join('')}
  </div>
  <div class="debrief-footer">Last updated ${DATE_STR}</div>`;
}

// ── INIT ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Wire up nav taps
  document.querySelectorAll('.nav-item[data-view]').forEach(item => {
    item.addEventListener('click', () => switchView(item.dataset.view));
    item.addEventListener('touchend', (e) => { e.preventDefault(); switchView(item.dataset.view); });
  });

  fetchChannelData();
  renderScripts();
  renderBuilder();
});
</script>
